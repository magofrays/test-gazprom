spring:
  application:
    name: "subscription-service"
  datasource:
    url: jdbc:postgresql://${DB_CONTAINER:localhost}:${DB_PORT:5432}/${DB_NAME:subscription_db}
    username: ${DB_USER:subscription_db}
    password: ${DB_PASSWORD:subscription_db}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: ${LOG_SHOW_SQL:true}
    show-sql: ${LOG_SHOW_SQL:true}
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yml
    default-schema: public

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

scheduler:
  check-subscription:
    ending-hours: ${NOTIFICATION_BEFORE_ENDING_HOURS:24}

logging:
  level:
    by.magofrays: INFO
    org.springframework.web: INFO
    liquibase: INFO

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method